<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <title>BighaWala.com OG Image Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@700;800;900&family=Poppins:wght@700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="stylesheet" href="/css/premium-style.css">
</head>
<body class="relative flex flex-col justify-between select-none">
  <!-- Subtle background accent circles -->
  <div class="absolute -top-40 -left-40 w-96 h-96 rounded-full bg-white/5 blur-3xl pointer-events-none"></div>
  <div class="absolute -bottom-20 right-20 w-80 h-80 rounded-full bg-orange-500/10 blur-3xl pointer-events-none"></div>
  <div class="absolute top-20 right-40 w-64 h-64 rounded-full bg-emerald-500/10 blur-3xl pointer-events-none"></div>

  <!-- Main Content Area -->
  <div class="flex-grow flex flex-col justify-center px-16 pt-12 relative z-10">
    <!-- Header / Branding -->
    <div class="flex items-center gap-4 mb-8">
      <div class="text-5xl drop-shadow-md">🏡</div>
      <div class="flex flex-col">
        <span class="text-5xl font-black tracking-tight text-white leading-none">
          <span class="text-orange-500">Bigha</span>Wala<span class="text-emerald-400">.com</span>
        </span>
      </div>
    </div>

    <!-- Hero Headline -->
    <h1 class="text-6xl font-black text-white leading-tight drop-shadow-lg mb-6" style="font-family: 'Noto Sans Devanagari', sans-serif;">
      बिहार की जमीन की <span class="text-yellow-400">हर जानकारी</span>
    </h1>

    <!-- Core Features / Subtext -->
    <p class="text-xl font-bold text-emerald-100/90 tracking-wide bg-emerald-950/40 py-3.5 px-6 rounded-2xl border border-emerald-800/50 inline-block self-start">
      Bigha Calculator &nbsp;|&nbsp; Dakhil Kharij &nbsp;|&nbsp; Bhulekh &nbsp;|&nbsp; Land Rates
    </p>
  </div>

  <!-- Bottom Saffron Bar -->
  <div class="h-20 bg-[#FF6F00] flex items-center justify-between px-16 relative z-10 border-t-4 border-orange-400 shadow-2xl">
    <span class="text-xl font-extrabold text-white uppercase tracking-wider">
      🇮🇳 Bihar ka #1 Land Platform
    </span>
    <span class="bg-white text-[#FF6F00] font-black px-6 py-2 rounded-full text-base uppercase tracking-widest shadow-md">
      100% Free / मुफ्त
    </span>
  </div>
</body>
</html>
